<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#396afc">
  <title>KurbanPay</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐄</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    :root { 
      --gradient-nature: linear-gradient(135deg, #396afc 0%, #0823BD 100%); 
      --primary: #396afc; --accent-light: #CDD9FA; --bg-body: #F3F4F6; 
      --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; --danger: #DC2626;
      --warning: #F59E0B;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background-color: #E5E7EB; font-family: 'Inter', sans-serif; 
      margin: 0; padding: 0; min-height: 100vh; 
      display: flex; justify-content: center; color: var(--text-main); 
    }

    .app-container { 
      width: 100%; max-width: 480px; background-color: var(--bg-body); 
      min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); 
    }
    
    .header-nature { 
      background: var(--gradient-nature); padding: 25px 20px 90px; color: white; 
      border-radius: 0 0 30px 30px; position: relative; overflow: hidden; 
      transition: background 0.3s;
    }
    .header-nature.offline-mode { background: #4B5563; }
    
    .header-nature::before { 
      content: ''; position: absolute; top: -30px; right: -30px; 
      width: 180px; height: 180px; background: rgba(255,255,255,0.08); 
      border-radius: 50%; pointer-events: none; 
    }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; position: relative; z-index: 2; }
    .brand-logo { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; }
    
    #statusIndicator { font-size:12px; background:rgba(255,255,255,0.2); padding:6px 12px; border-radius:20px; font-weight:600; display: flex; align-items: center; gap: 6px; }
    .dot-online { color:#86efac; }
    .dot-offline { color:#f87171; }

    .balance-label { font-size: 13px; opacity: 0.9; margin-bottom: 5px; font-weight: 500; }
    .balance-amount { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
    
    .main-card { 
      background: var(--card-bg); border-radius: 24px; margin: -60px 20px 20px; 
      padding: 25px; box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1); 
      position: relative; z-index: 10; 
    }
    
    .input-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block; }
    .money-input-group { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 14px; display: flex; align-items: center; padding: 12px 16px; margin-bottom: 25px; transition: all 0.2s; }
    .money-input-group:focus-within { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(65, 100, 74, 0.2); }
    .curr { font-weight: 700; color: var(--primary); margin-right: 10px; font-size: 20px; }
    .inp-money { border: none; background: transparent; width: 100%; font-size: 28px; font-weight: 700; color: var(--text-main); outline: none; }
    
    .scanner-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .btn-cam-toggle { background: #fff; color: var(--text-main); border: 1px solid #E5E7EB; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
    .btn-cam-toggle.active { background: #FEF2F2; color: var(--danger); border-color: #FEE2E2; }
    .btn-cam-toggle.inactive { background: var(--accent-light); color: var(--primary); border-color: #CDE4CF; }
    
    .scanner-box { border-radius: 18px; overflow: hidden; background: #111; min-height: 250px; position: relative; border: 2px solid #F3F4F6; }
    #cameraPlaceholder { position: absolute; inset: 0; background: #F9FAFB; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); z-index: 5; }
    
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .inp-manual { flex: 1; padding: 14px; border: 1px solid #E5E7EB; border-radius: 12px; background: #F9FAFB; font-size: 15px; outline: none; text-align: center; }
    .inp-manual:focus { border-color: var(--primary); background: #fff; }
    .btn-primary { background: var(--gradient-nature); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; }
    
    #offlineAlert { display: none; background: #FEF3C7; color: #92400E; padding: 10px 15px; margin: 0 20px 15px; border-radius: 12px; font-size: 12px; font-weight: 600; align-items: center; gap: 10px; border: 1px solid #FDE68A; position: relative; z-index: 11; }

    .history-section { padding: 0 20px 40px; }
    .section-head { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 15px; }
    .tx-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .tx-icon { width: 44px; height: 44px; background: var(--accent-light); color: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .tx-amount { font-weight: 700; color: var(--primary); font-size: 16px; }
    .tx-pending { border-left: 4px solid var(--warning); opacity: 0.8; }

    #loadingOverlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(2px); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner-leaf { width: 40px; height: 40px; border: 4px solid var(--accent-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="loadingOverlay">
      <div class="spinner-leaf"></div>
      <p style="margin-top:15px; font-weight:600; color: var(--primary);">Menghubungi Server...</p>
    </div>

    <div id="offlineAlert">
        <i class="fas fa-wifi-slash"></i>
        <span><b id="queueCount">0</b> data belum masuk Google Sheet.</span>
        <button onclick="syncData()" style="background:#B45309; color:white; border:none; padding:5px 10px; border-radius:8px; font-size:11px; cursor:pointer; font-weight:700;">SINKRON SEKARANG</button>
    </div>

    <header class="header-nature" id="appHeader">
      <div class="top-bar">
        <div class="brand-logo"><i class="fas fa-leaf"></i>&nbsp;KurbanPay</div>
        <div id="statusIndicator">
          <i class="fas fa-circle dot-online" id="statusDot"></i> <span id="statusText">Online</span>
        </div>
      </div>
      <div>
        <div class="balance-label">Penerimaan Real-time (Sheet)</div>
        <div class="balance-amount" id="textTotalHariIni">Rp 0</div>
      </div>
    </header>

    <div class="main-card">
      <label class="input-label">1. MASUKKAN NOMINAL</label>
      <div class="money-input-group">
        <span class="curr">Rp</span>
        <input type="tel" id="inputNominal" class="inp-money" placeholder="0" oninput="formatRupiahInput(this)">
      </div>

      <div class="scanner-header">
        <label class="input-label" style="margin:0;">2. SCAN QR WARGA</label>
        <button id="btnCamToggle" class="btn-cam-toggle active" onclick="toggleCamera()">
            <i class="fas fa-video-slash"></i> Tutup
        </button>
      </div>

      <div class="scanner-box">
        <div id="cameraPlaceholder" style="display:none;">
            <i class="fas fa-camera" style="font-size:40px; margin-bottom:15px; color:#D1D5DB;"></i>
            <span style="font-weight:600; color:#4B5563;">Kamera Nonaktif</span>
        </div>
        <div id="reader"></div>
      </div>
        
      <div class="btn-row">
          <input type="text" id="manualId" class="inp-manual" placeholder="ID Manual">
          <button class="btn-primary" onclick="kirimManual()">
              KIRIM <i class="fas fa-paper-plane"></i>
          </button>
      </div>

      <div style="margin-top: 15px;">
          <select id="selectWarga" class="inp-manual" style="width: 100%; appearance: auto;" onchange="pilihWarga()">
              <option value="">⏳ Memuat daftar warga...</option>
          </select>
      </div>
    </div>

    <div class="history-section">
      <div class="section-head">Riwayat Transaksi</div>
      <div id="listTransaksi">
         <div style="text-align:center; padding:30px; color:var(--text-muted);">
            <i class="fas fa-sync fa-spin"></i> Sinkronisasi...
         </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4OF7oZpHzK_y1xKbFcZ0cgxcP3gu12xHVel_i0qaRftFvt3LT0mGslHCGZDaQswtC/exec";
    
    let html5QrcodeScanner = null;
    let isCameraRunning = false;
    let isLocked = false;
    let isOnline = navigator.onLine;
    const suaraSukses = new Audio('https://upload.wikimedia.org/wikipedia/commons/3/34/Sound_Effect_-_Success_01.ogg');

    function formatRupiahInput(input) {
      let plain = input.value.replace(/\D/g, ''); 
      if (plain === "" || parseInt(plain) === 0) { input.value = ""; return; }
      input.value = new Intl.NumberFormat('id-ID').format(plain);
    }

    window.onload = function() { 
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('pin')) localStorage.setItem('adminPin', urlParams.get('pin'));

      updateStatusUI();
      loadRiwayat(); 
      loadWarga(); 
      startCamera(); 
      
      window.addEventListener('online', () => { isOnline = true; updateStatusUI(); syncData(); });
      window.addEventListener('offline', () => { isOnline = false; updateStatusUI(); });
      updateQueueAlert();
    };

    function updateStatusUI() {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        const header = document.getElementById('appHeader');
        if (isOnline) {
            dot.className = 'fas fa-circle dot-online';
            text.innerText = 'Online';
            header.classList.remove('offline-mode');
        } else {
            dot.className = 'fas fa-circle dot-offline';
            text.innerText = 'Offline';
            header.classList.add('offline-mode');
        }
    }

    function saveOffline(data) {
        let queue = JSON.parse(localStorage.getItem('kurban_queue') || '[]');
        const sel = document.getElementById('selectWarga');
        queue.push({
            ...data,
            timestamp: new Date().toLocaleTimeString(),
            nama_sementara: sel.selectedIndex > 0 ? sel.options[sel.selectedIndex].text.split(' (')[0] : data.idUser
        });
        localStorage.setItem('kurban_queue', JSON.stringify(queue));
        updateQueueAlert();
        renderHistoryWithQueue();
    }

    function updateQueueAlert() {
        let queue = JSON.parse(localStorage.getItem('kurban_queue') || '[]');
        const alert = document.getElementById('offlineAlert');
        alert.style.display = queue.length > 0 ? 'flex' : 'none';
        if (queue.length > 0) document.getElementById('queueCount').innerText = queue.length;
    }

    async function syncData() {
        if (!isOnline) return;
        let queue = JSON.parse(localStorage.getItem('kurban_queue') || '[]');
        if (queue.length === 0) return;

        document.getElementById('loadingOverlay').style.display = 'flex';
        document.querySelector('#loadingOverlay p').innerText = "Mengirim data ke Sheet...";

        let successCount = 0;
        
        for (let item of queue) {
            try {
                // PAKSA PAKAI GET UNTUK SYNC OFFLINE
                const params = new URLSearchParams({
                    action: 'prosesScan',
                    idUser: item.idUser,
                    nominalInput: item.nominalInput,
                    pin: item.pin || localStorage.getItem('adminPin')
                }).toString();

                // Kita pakai fetch standar tapi tidak peduli responnya (no-cors)
                // Google Sheet pasti menerima ini jika URL-nya benar
                await fetch(`${API_URL}?${params}`, { method: 'GET', mode: 'no-cors' });
                
                await new Promise(r => setTimeout(r, 2000)); // Jeda 2 detik agar tidak overload
                successCount++;
            } catch (e) { console.error(e); }
        }
        
        // Bersihkan queue yang berhasil
        const remaining = JSON.parse(localStorage.getItem('kurban_queue') || '[]').slice(successCount);
        localStorage.setItem('kurban_queue', JSON.stringify(remaining));
        
        updateQueueAlert();
        setTimeout(() => {
            loadRiwayat();
            document.getElementById('loadingOverlay').style.display = 'none';
            if (successCount > 0) Swal.fire({ icon: 'success', title: 'Data Masuk!', text: `${successCount} data berhasil dicatat di Google Sheet.` });
        }, 2000);
    }

    function prosesData(idUser) {
      let rawString = document.getElementById('inputNominal').value;
      let cleanNominal = rawString.replace(/\./g, '');
      if (!cleanNominal || parseInt(cleanNominal) <= 0) {
        Swal.fire({ title: 'Isi Nominal!', icon: 'warning' });
        if(html5QrcodeScanner) html5QrcodeScanner.resume();
        return;
      }

      const pin = localStorage.getItem('adminPin');
      
      // Jika mode ONLINE, kita coba kirim dengan cara paling aman
      if (isOnline) {
          isLocked = true;
          document.getElementById('loadingOverlay').style.display = 'flex';
          
          // GUNAKAN METODE GET UNTUK SEMUA TRANSAKSI ONLINE (PALING STABIL)
          const params = new URLSearchParams({
              action: 'prosesScan',
              idUser: idUser,
              nominalInput: cleanNominal,
              pin: pin
          }).toString();

          fetch(`${API_URL}?${params}`, { method: 'GET', mode: 'no-cors' })
          .then(() => {
              // Karena no-cors, kita tidak bisa baca JSON response. 
              // Kita asumsikan sukses dan verifikasi dengan refresh riwayat
              suaraSukses.play().catch(e => {});
              Swal.fire({ icon: 'success', title: 'Terkirim!', text: 'Data sedang diproses oleh Google Sheet.', timer: 2000, showConfirmButton: false });
              resetInputs();
              setTimeout(() => {
                  loadRiwayat();
                  document.getElementById('loadingOverlay').style.display = 'none';
                  isLocked = false;
              }, 3000);
          })
          .catch(() => {
              saveOffline({ idUser, nominalInput: cleanNominal, pin });
              handleError();
          });
      } else {
          saveOffline({ idUser, nominalInput: cleanNominal, pin });
          Swal.fire({ icon: 'info', title: 'Mode Offline', text: 'Data disimpan di HP. Klik SINKRON jika internet sudah ada.' });
          resetInputs();
      }
    }

    function toggleCamera() { isCameraRunning ? stopCamera() : startCamera(); }

    function startCamera() {
        const btn = document.getElementById('btnCamToggle');
        btn.innerHTML = '<i class="fas fa-video-slash"></i> Tutup';
        btn.className = 'btn-cam-toggle active'; 
        document.getElementById('cameraPlaceholder').style.display = 'none';
        if (html5QrcodeScanner === null) {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }, false);
            html5QrcodeScanner.render(onScanSuccess, (err) => {});
        }
        isCameraRunning = true;
    }

    function stopCamera() {
        const btn = document.getElementById('btnCamToggle');
        btn.innerHTML = '<i class="fas fa-camera"></i> Buka Kamera';
        btn.className = 'btn-cam-toggle inactive'; 
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().then(() => {
                document.getElementById('cameraPlaceholder').style.display = 'flex';
                html5QrcodeScanner = null; isCameraRunning = false;
            });
        }
    }

    function loadRiwayat() {
      if (!isOnline) { renderHistoryWithQueue(); return; }
      fetch(API_URL + "?action=getTopRiwayat")
        .then(r => r.json())
        .then(data => { window.latestData = data; updateUI(data); })
        .catch(() => renderHistoryWithQueue());
    }

    function loadWarga() {
      if (!isOnline) return;
      fetch(API_URL + "?action=getWarga")
        .then(r => r.json())
        .then(data => {
            const select = document.getElementById('selectWarga');
            select.innerHTML = '<option value="">-- Cari Nama Warga --</option>'; 
            data.forEach(w => {
                let opt = document.createElement('option');
                opt.value = w.id; opt.innerHTML = `${w.nama} (${w.id})`;
                select.appendChild(opt);
            });
        });
    }

    function pilihWarga() {
        const select = document.getElementById('selectWarga');
        if(select.value !== "") document.getElementById('manualId').value = select.value;
    }

    function onScanSuccess(decodedText) {
      if (isLocked) return;
      if(html5QrcodeScanner) html5QrcodeScanner.pause(); 
      prosesData(decodedText);
    }

    function kirimManual() {
      const id = document.getElementById('manualId').value.trim();
      if(!id) return Swal.fire({ title:'ID Kosong', icon:'error' });
      prosesData(id);
    }

    function resetInputs() {
        document.getElementById('manualId').value = '';
        document.getElementById('inputNominal').value = ''; 
        document.getElementById('selectWarga').value = '';
        if(isCameraRunning && html5QrcodeScanner) html5QrcodeScanner.resume();
    }

    function handleError() {
      document.getElementById('loadingOverlay').style.display = 'none';
      isLocked = false;
      if (isCameraRunning && html5QrcodeScanner) html5QrcodeScanner.resume();
    }

    function renderHistoryWithQueue() { updateUI(window.latestData || { list: [], totalHariIni: "Rp 0" }); }

    function updateUI(data) {
      if (!data) return;
      if (data.totalHariIni) document.getElementById('textTotalHariIni').innerText = data.totalHariIni;
      const box = document.getElementById('listTransaksi');
      let queue = JSON.parse(localStorage.getItem('kurban_queue') || '[]');
      let html = '';
      
      queue.reverse().forEach(item => {
          const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(item.nominalInput);
          html += `<div class="tx-item tx-pending"><div style="display:flex;align-items:center;gap:12px;"><div class="tx-icon" style="background:#FEF3C7;color:#B45309;"><i class="fas fa-clock"></i></div><div><div style="font-weight:600;font-size:14px;">${item.nama_sementara}</div><div style="font-size:11px;color:var(--warning);">Belum Masuk Sheet (${item.timestamp})</div></div></div><div class="tx-amount" style="color:var(--warning);">${fmt}</div></div>`;
      });

      if (data.list) {
          data.list.forEach(item => {
            html += `<div class="tx-item"><div style="display:flex;align-items:center;gap:12px;"><div class="tx-icon"><i class="fas fa-check"></i></div><div><div style="font-weight:600;font-size:14px;">${item.nama}</div><div style="font-size:11px;color:var(--text-muted);">${item.waktu}</div></div></div><div class="tx-amount">+${item.jumlah}</div></div>`;
          });
      }
      box.innerHTML = html || '<div style="padding:30px;text-align:center;color:#9CA3AF;">Belum ada data</div>';
    }
  </script>
</body>
</html>
