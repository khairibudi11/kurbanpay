<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#396afc">
  <title>KurbanPay PRO</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐄</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    :root { 
      --gradient-nature: linear-gradient(135deg, #396afc 0%, #0823BD 100%); 
      --primary: #396afc; --accent-light: #CDD9FA; --bg-body: #F3F4F6; 
      --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; --danger: #DC2626;
      --success: #10B981; --warning: #F59E0B;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background-color: #E5E7EB; font-family: 'Inter', sans-serif; 
      margin: 0; padding: 0; min-height: 100vh; 
      display: flex; justify-content: center; color: var(--text-main); 
    }

    .app-container { 
      width: 100%; max-width: 480px; background-color: var(--bg-body); 
      min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); 
    }
    
    .header-nature { 
      background: var(--gradient-nature); padding: 25px 20px 90px; color: white; 
      border-radius: 0 0 30px 30px; position: relative; overflow: hidden; 
      transition: background 0.3s ease;
    }
    .header-nature.is-offline { background: #4B5563; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; position: relative; z-index: 2; }
    .brand-logo { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; }
    
    /* Connection Badge */
    #statusBadge { font-size: 11px; padding: 6px 12px; border-radius: 20px; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: 0.3s; }
    .badge-online { background: rgba(134, 239, 172, 0.2); color: #86efac; }
    .badge-offline { background: rgba(248, 113, 113, 0.2); color: #f87171; }
    
    .balance-label { font-size: 13px; opacity: 0.9; margin-bottom: 5px; font-weight: 500; }
    .balance-amount { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
    
    .main-card { 
      background: var(--card-bg); border-radius: 24px; margin: -60px 20px 20px; 
      padding: 25px; box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1); 
      position: relative; z-index: 10; 
    }
    
    .input-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block; }
    .money-input-group { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 14px; display: flex; align-items: center; padding: 12px 16px; margin-bottom: 25px; }
    .curr { font-weight: 700; color: var(--primary); margin-right: 10px; font-size: 20px; }
    .inp-money { border: none; background: transparent; width: 100%; font-size: 28px; font-weight: 700; outline: none; }
    
    .scanner-box { border-radius: 18px; overflow: hidden; background: #111; min-height: 250px; position: relative; border: 2px solid #F3F4F6; }
    #reader { width: 100%; }
    
    .btn-cam-toggle { background: #fff; border: 1px solid #E5E7EB; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-cam-toggle.active { color: var(--danger); }
    
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .inp-manual { flex: 1; padding: 14px; border: 1px solid #E5E7EB; border-radius: 12px; background: #F9FAFB; outline: none; }
    .btn-primary { background: var(--gradient-nature); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Offline Queue Alert */
    #offlineAlert { 
        display: none; background: #FEF3C7; color: #92400E; padding: 10px 15px; 
        margin: 0 20px 15px; border-radius: 12px; font-size: 12px; font-weight: 600; 
        align-items: center; gap: 10px; border: 1px solid #FDE68A;
    }

    .history-section { padding: 0 20px 40px; }
    .tx-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 16px; border-radius: 16px; margin-bottom: 12px; }
    .tx-amount { font-weight: 700; color: var(--primary); }
    .tx-offline { color: var(--warning); font-style: italic; font-size: 10px; }

    #loadingOverlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { width: 40px; height: 40px; border: 4px solid #E5E7EB; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (min-width: 768px) {
      .app-container { max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 40px; }
      .header-nature { grid-column: 2; border-radius: 24px; height: fit-content; margin-top: 0; padding-bottom: 40px; }
      .main-card { grid-column: 1; grid-row: 1 / 3; margin: 0; }
      .history-section { grid-column: 2; padding: 0; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <p id="loadingText" style="margin-top:15px; font-weight:600; color: var(--primary);">Menyimpan...</p>
    </div>

    <!-- Alert Antrian Offline -->
    <div id="offlineAlert">
        <i class="fas fa-exclamation-triangle"></i>
        <span>Ada <b id="queueCount">0</b> data tersimpan offline. Akan otomatis terkirim saat sinyal kembali.</span>
    </div>

    <header class="header-nature" id="appHeader">
      <div class="top-bar">
        <div class="brand-logo"><i class="fas fa-leaf"></i> KurbanPay</div>
        <div id="statusBadge" class="badge-online">
          <i class="fas fa-circle" style="font-size:8px;"></i> <span id="statusText">Online</span>
        </div>
      </div>
      <div>
        <div class="balance-label">Penerimaan Terakhir</div>
        <div class="balance-amount" id="textTotalHariIni">Rp 0</div>
      </div>
    </header>

    <div class="main-card">
      <label class="input-label">1. NOMINAL</label>
      <div class="money-input-group">
        <span class="curr">Rp</span>
        <input type="tel" id="inputNominal" class="inp-money" placeholder="0" oninput="formatRupiahInput(this)">
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <label class="input-label" style="margin:0;">2. SCAN QR</label>
        <button id="btnCamToggle" class="btn-cam-toggle active" onclick="toggleCamera()">
            <i class="fas fa-video-slash"></i> Tutup
        </button>
      </div>

      <div class="scanner-box">
        <div id="reader"></div>
      </div>
        
      <div class="btn-row">
          <input type="text" id="manualId" class="inp-manual" placeholder="ID Manual">
          <button class="btn-primary" id="btnKirim" onclick="kirimData()">
              KIRIM <i class="fas fa-paper-plane" style="margin-left:5px;"></i>
          </button>
      </div>

      <div style="margin-top: 15px;">
          <select id="selectWarga" class="inp-manual" style="width: 100%;" onchange="pilihWarga()">
              <option value="">-- Pilih Nama Warga --</option>
          </select>
      </div>
    </div>

    <div class="history-section">
      <div style="font-weight:700; margin-bottom:15px;">Riwayat Transaksi</div>
      <div id="listTransaksi"></div>
    </div>
  </div>

  <script>
    // URL SCRIPT GOOGLE ANDA
    const API_URL = "https://script.google.com/macros/s/AKfycbw4OF7oZpHzK_y1xKbFcZ0cgxcP3gu12xHVel_i0qaRftFvt3LT0mGslHCGZDaQswtC/exec";
    
    let html5QrcodeScanner = null;
    let isLocked = false;
    let isOnline = navigator.onLine;

    // --- INITIALIZATION ---
    window.onload = function() {
        checkConnection();
        loadWarga();
        loadRiwayat();
        startCamera();
        
        // Listener Perubahan Koneksi
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        
        // Cek antrian yang tersisa dari sesi sebelumnya
        updateQueueUI();
    };

    // --- CONNECTION HANDLING ---
    function checkConnection() {
        if (navigator.onLine) {
            handleOnline();
        } else {
            handleOffline();
        }
    }

    function handleOnline() {
        isOnline = true;
        const badge = document.getElementById('statusBadge');
        const header = document.getElementById('appHeader');
        badge.className = 'badge-online';
        badge.innerHTML = '<i class="fas fa-circle" style="font-size:8px;"></i> Online';
        header.classList.remove('is-offline');
        
        // Coba sinkronisasi jika ada antrian
        syncOfflineData();
    }

    function handleOffline() {
        isOnline = false;
        const badge = document.getElementById('statusBadge');
        const header = document.getElementById('appHeader');
        badge.className = 'badge-offline';
        badge.innerHTML = '<i class="fas fa-exclamation-triangle" style="font-size:8px;"></i> Offline';
        header.classList.add('is-offline');
    }

    // --- DATA QUEUE LOGIC (OFFLINE MODE) ---
    function saveToOfflineQueue(data) {
        let queue = JSON.parse(localStorage.getItem('kurbanQueue') || '[]');
        queue.push({
            ...data,
            timestamp: new Date().toLocaleTimeString(),
            tempId: 'OFF-' + Date.now()
        });
        localStorage.setItem('kurbanQueue', JSON.stringify(queue));
        updateQueueUI();
        
        // Tambahkan ke UI riwayat sebagai "Pending"
        addPendingToUI(data);
    }

    async function syncOfflineData() {
        let queue = JSON.parse(localStorage.getItem('kurbanQueue') || '[]');
        if (queue.length === 0) return;

        console.log("Sinkronisasi data offline...");
        
        for (let i = 0; i < queue.length; i++) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Kita gunakan no-cors untuk kirim cepat saat sinkronisasi
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(queue[i])
                });
                // Karena no-cors tidak bisa baca response, kita asumsikan terkirim jika tidak error
            } catch (e) {
                console.error("Gagal sinkron satu item", e);
                break; // Berhenti jika gagal lagi
            }
        }

        // Bersihkan queue dan refresh data asli dari server
        localStorage.removeItem('kurbanQueue');
        updateQueueUI();
        loadRiwayat();
        
        Swal.fire({
            icon: 'success',
            title: 'Sinkronisasi Berhasil',
            text: 'Semua data offline telah terkirim.',
            timer: 2000
        });
    }

    function updateQueueUI() {
        let queue = JSON.parse(localStorage.getItem('kurbanQueue') || '[]');
        const alertBox = document.getElementById('offlineAlert');
        const countText = document.getElementById('queueCount');
        
        if (queue.length > 0) {
            alertBox.style.display = 'flex';
            countText.innerText = queue.length;
        } else {
            alertBox.style.display = 'none';
        }
    }

    // --- CORE FUNCTIONS ---
    function formatRupiahInput(el) {
        let val = el.value.replace(/\D/g, '');
        el.value = val ? new Intl.NumberFormat('id-ID').format(val) : '';
    }

    function kirimData() {
        if (isLocked) return;
        
        const idUser = document.getElementById('manualId').value.trim();
        const nominalRaw = document.getElementById('inputNominal').value.replace(/\./g, '');

        if (!idUser || !nominalRaw) {
            return Swal.fire('Lengkapi Data', 'Isi nominal dan ID warga', 'warning');
        }

        const dataObj = {
            action: 'prosesScan',
            idUser: idUser,
            nominalInput: nominalRaw,
            pin: localStorage.getItem('adminPin') || ''
        };

        if (!isOnline) {
            // MODE OFFLINE
            saveToOfflineQueue(dataObj);
            Swal.fire({
                icon: 'info',
                title: 'Mode Offline',
                text: 'Sinyal lemah. Data disimpan di HP dan akan dikirim otomatis saat online.',
                timer: 2500
            });
            resetForm();
        } else {
            // MODE ONLINE
            executeOnline(dataObj);
        }
    }

    function executeOnline(dataObj) {
        isLocked = true;
        document.getElementById('loadingOverlay').style.display = 'flex';

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(dataObj)
        })
        .then(res => res.json())
        .then(res => {
            document.getElementById('loadingOverlay').style.display = 'none';
            if (res.status === 'sukses') {
                Swal.fire({ icon: 'success', title: 'Terkirim!', text: res.nama + " - " + res.nominal, timer: 1500, showConfirmButton: false });
                updateUI({ list: res.riwayatBaru, totalHariIni: res.totalHariIni });
                resetForm();
            } else {
                Swal.fire('Gagal', res.pesan, 'error');
            }
            isLocked = false;
            if (html5QrcodeScanner) html5QrcodeScanner.resume();
        })
        .catch(err => {
            document.getElementById('loadingOverlay').style.display = 'none';
            isLocked = false;
            // Jika tiba-tiba error saat kirim (sinyal drop tengah jalan)
            saveToOfflineQueue(dataObj);
            Swal.fire('Terputus', 'Koneksi hilang, data disimpan offline', 'info');
            resetForm();
        });
    }

    function resetForm() {
        document.getElementById('manualId').value = '';
        document.getElementById('inputNominal').value = '';
        document.getElementById('selectWarga').value = '';
    }

    // --- UI HELPERS ---
    function addPendingToUI(data) {
        const box = document.getElementById('listTransaksi');
        const nominalFmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(data.nominalInput);
        
        const html = `
            <div class="tx-item" style="opacity: 0.7; border-left: 4px solid var(--warning);">
                <div>
                    <div style="font-weight:600;">ID: ${data.idUser} <span class="tx-offline">(Menunggu Sinyal)</span></div>
                    <div style="font-size:11px;">Baru saja</div>
                </div>
                <div class="tx-amount" style="color: var(--warning)">${nominalFmt}</div>
            </div>
        ` + box.innerHTML;
        box.innerHTML = html;
    }

    function loadRiwayat() {
        if (!isOnline) return;
        fetch(API_URL + "?action=getTopRiwayat")
            .then(res => res.json())
            .then(data => updateUI(data))
            .catch(e => console.log("Offline, riwayat tidak update"));
    }

    function loadWarga() {
        if (!isOnline) {
            document.getElementById('selectWarga').innerHTML = '<option>Mode Offline - Daftar tidak tersedia</option>';
            return;
        }
        fetch(API_URL + "?action=getWarga")
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('selectWarga');
                select.innerHTML = '<option value="">-- Pilih Nama Warga --</option>';
                data.forEach(w => {
                    let opt = document.createElement('option');
                    opt.value = w.id;
                    opt.innerText = `${w.nama} (${w.id})`;
                    select.appendChild(opt);
                });
            });
    }

    function updateUI(data) {
        if (data.totalHariIni) document.getElementById('textTotalHariIni').innerText = data.totalHariIni;
        const box = document.getElementById('listTransaksi');
        if (!data.list) return;
        
        let html = '';
        data.list.forEach(item => {
            html += `
                <div class="tx-item">
                    <div>
                        <div style="font-weight:600;">${item.nama}</div>
                        <div style="font-size:11px; color:var(--text-muted);">${item.waktu}</div>
                    </div>
                    <div class="tx-amount">+${item.jumlah}</div>
                </div>`;
        });
        box.innerHTML = html;
    }

    // --- CAMERA LOGIC ---
    function onScanSuccess(decodedText) {
        if (isLocked) return;
        document.getElementById('manualId').value = decodedText;
        if (html5QrcodeScanner) html5QrcodeScanner.pause();
        kirimData();
    }

    function startCamera() {
        const config = { fps: 10, qrbox: 200 };
        html5QrcodeScanner = new Html5QrcodeScanner("reader", config);
        html5QrcodeScanner.render(onScanSuccess);
    }

    function toggleCamera() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;
            document.getElementById('btnCamToggle').innerHTML = '<i class="fas fa-camera"></i> Buka';
        } else {
            startCamera();
            document.getElementById('btnCamToggle').innerHTML = '<i class="fas fa-video-slash"></i> Tutup';
        }
    }

    function pilihWarga() {
        const val = document.getElementById('selectWarga').value;
        if (val) document.getElementById('manualId').value = val;
    }
  </script>
</body>
</html>
